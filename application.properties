# ── Server ───────────────────────────────────────────
# Railway sets PORT automatically — we read it here
server.port=${PORT:8080}

# ── MySQL (Railway provides MYSQL_URL automatically) ─
# Format Railway gives: mysql://user:pass@host:port/dbname
# Spring needs it split into separate properties below.
# Railway also provides individual vars: MYSQLHOST, MYSQLUSER etc.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ab_portfolio}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:YOUR_LOCAL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ── JWT ──────────────────────────────────────────────
# Set this as an environment variable in Railway dashboard
jwt.secret=${JWT_SECRET:AB_PORTFOLIO_CHANGE_THIS_IN_PRODUCTION}
jwt.expiration=86400000

# ── Email ────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.to=${MAIL_USERNAME:your@gmail.com}

# ── Stripe ───────────────────────────────────────────
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_your_key_here}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_secret}

# ── CORS — allow your Railway domain ─────────────────
# Add your actual Railway URL here after deploying
app.cors.origins=${CORS_ORIGINS:http://localhost:8080,http://localhost:3000}

# ── Logging ──────────────────────────────────────────
logging.level.com.ab=INFO
